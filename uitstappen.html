<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uitstappen &amp; Activiteiten — GO! basisschool Klim-Op</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#0E9E96;--teal-d:#0B7E78;--teal-xd:#08534f;--teal-l:#e6f4f2;
  --coral:#FF6B5C;--coral-d:#d8523f;--coral-soft:rgba(255,107,92,.16);--coral-line:rgba(255,107,92,.55);
  --green:#3FA34D;--green-d:#2f8a3c;--green-l:#e7f6e9;
  --amber:#dd9128;--amber-d:#a96f17;--amber-l:#fbf1de;
  --sand:#ece4d3;--sand-d:#8c7c5c;
  --ink:#16302e;--slate:#5d716f;--slate-l:#90a4a2;
  --paper:#fff;--bg:#eef4f3;--bg-2:#f7faf9;--line:#dde8e6;--line-d:#cbdad7;
  --shadow:0 1px 2px rgba(8,83,79,.05),0 8px 24px rgba(8,83,79,.07);
  --shadow-lg:0 14px 50px rgba(8,83,79,.20);
  --r:14px;--r-sm:10px;--r-lg:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-feature-settings:"tnum" 1;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
::selection{background:var(--teal);color:#fff}
.app{max-width:1200px;margin:0 auto;padding:0 18px 90px}
.topbar{position:sticky;top:0;z-index:40;background:rgba(238,244,243,.88);backdrop-filter:blur(10px);margin:0 -18px;padding:0 18px;border-bottom:1px solid var(--line)}
.topbar-in{display:flex;align-items:center;gap:16px;padding:14px 0 0}
.brand{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.logo{width:42px;height:42px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,var(--teal),var(--teal-d));display:grid;place-items:center;color:#fff;font-weight:800;font-size:19px;box-shadow:0 4px 12px rgba(14,158,150,.35);letter-spacing:-.5px}
.brand h1{font-size:17px;font-weight:700;letter-spacing:-.3px;line-height:1.1}
.brand p{font-size:12.5px;color:var(--slate);font-weight:500}
.admin-toggle{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:999px;border:1px solid var(--line-d);background:var(--paper);font-size:13.5px;font-weight:600;color:var(--slate);transition:.18s;white-space:nowrap}
.admin-toggle:hover{border-color:var(--teal);color:var(--teal-d)}
.admin-toggle.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.admin-toggle svg{width:15px;height:15px}
.tabs{display:flex;gap:4px;padding:12px 0 0}
.tab{padding:10px 18px 14px;font-size:15px;font-weight:600;color:var(--slate);position:relative;border-radius:8px 8px 0 0;transition:color .15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--teal-d)}
.tab.active::after{content:"";position:absolute;left:10px;right:10px;bottom:-1px;height:3px;background:var(--teal);border-radius:3px 3px 0 0}
.tab .badge-n{display:inline-block;margin-left:6px;font-size:11.5px;font-weight:700;background:var(--line);color:var(--slate);padding:1px 7px;border-radius:999px}
.tab.active .badge-n{background:var(--teal);color:#fff}
.stripe{height:4px;border-radius:4px;margin:0 -18px;background:linear-gradient(90deg,var(--teal) 0%,var(--green) 40%,#e7c34e 66%,var(--coral) 100%)}
main{padding-top:26px}
.view-title{font-size:24px;font-weight:800;letter-spacing:-.6px;margin-bottom:3px}
.view-sub{color:var(--slate);font-size:14.5px;margin-bottom:22px;max-width:66ch}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow)}
.form-wrap{max-width:820px}
.fieldset{padding:24px 26px;border-bottom:1px solid var(--line)}.fieldset:last-child{border-bottom:none}
.legend{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--teal-d);margin-bottom:18px}
.legend .dot{width:7px;height:7px;border-radius:50%;background:var(--teal)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 18px}
.grid.three{grid-template-columns:2fr 1fr 1fr}.grid .full{grid-column:1/-1}
label.fld{display:block}
.lbl{display:block;font-size:13.5px;font-weight:600;margin-bottom:6px;color:var(--ink)}
.lbl .opt{color:var(--slate-l);font-weight:500}
.inp{width:100%;padding:11px 13px;border:1.5px solid var(--line-d);border-radius:var(--r-sm);background:var(--bg-2);transition:.15s;font-size:14.5px}
.inp:focus{outline:none;border-color:var(--teal);background:#fff;box-shadow:0 0 0 3px rgba(14,158,150,.13)}
.inp::placeholder{color:var(--slate-l)}
textarea.inp{resize:vertical;min-height:60px;line-height:1.5}
.hint{font-size:12.5px;color:var(--slate);margin-top:6px}
.radio-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.rcard{display:flex;align-items:center;gap:13px;text-align:left;padding:15px 16px;border:2px solid var(--line-d);border-radius:14px;background:var(--bg-2);transition:.16s;position:relative}
.rcard:hover{border-color:var(--teal);background:#fff}
.rcard.sel{border-color:var(--teal);background:var(--teal-l);box-shadow:0 0 0 3px rgba(14,158,150,.1)}
.rc-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--line-d);flex-shrink:0;display:grid;place-items:center;transition:.16s;background:#fff}
.rcard.sel .rc-check{background:var(--teal);border-color:var(--teal)}
.rc-check svg{width:13px;height:13px;color:#fff;opacity:0;transform:scale(.4);transition:.16s}
.rcard.sel .rc-check svg{opacity:1;transform:scale(1)}
.rc-ic{font-size:22px;flex-shrink:0}
.rc-title{display:block;font-weight:700;font-size:14.5px}
.rc-sub{display:block;font-size:12.5px;color:var(--slate);font-weight:500}
.callout{display:flex;gap:11px;align-items:flex-start;background:var(--amber-l);border:1px solid #f0dcb1;color:var(--amber-d);padding:12px 15px;border-radius:12px;font-size:13.5px;font-weight:500;margin-bottom:16px;line-height:1.45}
.callout b{font-weight:700}
.subblock{margin-top:16px;padding:16px;border:1.5px dashed var(--line-d);border-radius:14px;background:var(--bg-2);display:none}
.subblock.show{display:block;animation:fade .2s}
@keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1}}
.subblock .sub-lbl{font-size:13.5px;font-weight:600;margin-bottom:10px}
.warn{margin-top:12px;font-size:13.5px;color:var(--coral-d);font-weight:600;display:none}
.warn.show{display:block}
.klas-head{display:flex;align-items:baseline;gap:10px;margin:16px 0 9px}.klas-head:first-child{margin-top:0}
.klas-head h4{font-size:11.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--slate-l)}
.klas-head .wis{margin-left:auto;font-size:12.5px;color:var(--teal-d);font-weight:600;cursor:pointer}
.klas-head .wis:hover{text-decoration:underline}
.klas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:8px}
.klas-tile{padding:10px 6px;border:1.5px solid var(--line-d);border-radius:11px;background:var(--bg-2);font-weight:700;font-size:13px;color:var(--slate);text-align:center;transition:.13s;position:relative;user-select:none;line-height:1.1}
.klas-tile:hover{border-color:var(--teal);color:var(--teal-d)}
.klas-tile.sel{background:var(--teal);border-color:var(--teal);color:#fff}
.klas-tile.sel::after{content:"";position:absolute;top:5px;right:6px;width:6px;height:6px;border-radius:50%;background:#fff}
.klas-count{font-size:12.5px;color:var(--slate);font-weight:600;margin-top:10px}
.form-actions{display:flex;gap:12px;align-items:center;padding:22px 26px;background:var(--bg-2);border-radius:0 0 var(--r-lg) var(--r-lg)}
.btn{padding:12px 22px;border-radius:11px;font-size:15px;font-weight:700;transition:.15s;display:inline-flex;align-items:center;gap:9px}
.btn-primary{background:var(--teal);color:#fff;box-shadow:0 4px 14px rgba(14,158,150,.3)}
.btn-primary:hover{background:var(--teal-d);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--slate);font-weight:600}.btn-ghost:hover{color:var(--ink)}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:var(--teal-d)}
.btn-sm{padding:8px 14px;font-size:13.5px;border-radius:9px}
.btn-line{border:1.5px solid var(--line-d);background:#fff;color:var(--slate);font-weight:600}
.btn-line:hover{border-color:var(--teal);color:var(--teal-d)}
.btn-danger{color:#c0493b;font-weight:600}.btn-danger:hover{background:#fceae8}
.toolbar{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:18px}
.tb-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.tb-row+.tb-row{margin-top:11px;padding-top:11px;border-top:1px solid var(--line)}
.tb-lbl{font-size:11.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--slate-l);margin-right:2px}
.search{position:relative;flex:1;min-width:200px}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--slate-l)}
.search .inp{padding-left:38px;background:#fff}
.sort-pills,.seg-pills{display:flex;gap:4px;background:var(--bg);border:1px solid var(--line);padding:4px;border-radius:11px}
.sort-pills button,.seg-pills button{padding:7px 13px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--slate);transition:.13s;display:inline-flex;align-items:center;gap:5px}
.sort-pills button.on,.seg-pills button.on{background:var(--teal);color:#fff}
.sort-pills button .dir{font-size:10px}
.mini-sel{padding:8px 11px;border:1.5px solid var(--line-d);border-radius:9px;background:#fff;font-size:13.5px;font-weight:600;color:var(--ink)}
.mini-sel:focus{outline:none;border-color:var(--teal)}
.tbl-wrap{border-radius:var(--r-lg);border:1px solid var(--line);background:#fff;box-shadow:var(--shadow);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13.5px;table-layout:auto}
thead th{text-align:left;padding:11px 13px;font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--slate);background:var(--bg-2);border-bottom:1.5px solid var(--line);white-space:nowrap}
thead th.r{text-align:right}thead th.c{text-align:center}
tbody tr.trip{border-bottom:1px solid var(--line);transition:background .12s;cursor:pointer}
tbody tr.trip:last-child{border-bottom:none}
tbody tr.trip:hover{background:var(--bg-2)}
td{padding:11px 13px;vertical-align:middle}
.t-date{font-weight:600;white-space:nowrap}.t-date small{display:block;color:var(--slate);font-weight:500;font-size:11.5px}
.t-act{font-weight:600}.t-act small{display:block;color:var(--slate);font-weight:400;font-size:12px}
.t-act .mtag{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--coral-d);background:var(--coral-soft);padding:1px 6px;border-radius:5px;margin-left:6px;vertical-align:middle}
.klas-tags{display:flex;flex-wrap:wrap;gap:3px;max-width:160px}
.klas-tag{font-size:11px;font-weight:700;background:var(--teal-l);color:var(--teal-d);padding:2px 7px;border-radius:6px}
.num{font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}.r{text-align:right}.c{text-align:center}
.muted{color:var(--slate-l)}
.verv{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:13px;white-space:nowrap}
.verv small{display:block;color:var(--slate);font-weight:500;font-size:11.5px}
.verv.bus{color:var(--teal-d)}
.cost{font-variant-numeric:tabular-nums;font-weight:700;white-space:nowrap}
.cost small{display:block;color:var(--slate);font-weight:500;font-size:11.5px}
.fac{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;border:1px solid transparent}
.pill.open{background:var(--amber-l);color:var(--amber-d);border-color:#f0dcb1}
.pill.done{background:var(--green-l);color:var(--green-d);border-color:#bfe6c5}
.pill .pt{width:6px;height:6px;border-radius:50%}.pill.open .pt{background:var(--amber)}.pill.done .pt{background:var(--green)}
.note-ic{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--slate-l);background:transparent;transition:.13s;position:relative}
.note-ic:hover{background:var(--bg)}
.note-ic.has{color:var(--coral)}
.note-ic.has::after{content:"";position:absolute;top:5px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--coral);border:1.5px solid #fff}
.note-ic svg{width:17px;height:17px}
tr.grp-head td{background:var(--ink);color:#fff;font-weight:700;font-size:12.5px;letter-spacing:.5px;padding:7px 14px}
tr.grp-head td .gh-c{font-weight:500;opacity:.7;margin-left:8px}
.empty{text-align:center;padding:60px 20px;color:var(--slate)}
.empty .em-ic{font-size:38px;margin-bottom:10px;opacity:.5}.empty h3{font-size:17px;color:var(--ink);margin-bottom:4px}
/* kalender */
.cal-head{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.cal-nav{display:flex;align-items:center;gap:6px}
.cal-nav button{width:38px;height:38px;border-radius:10px;border:1px solid var(--line-d);background:#fff;display:grid;place-items:center;transition:.13s;font-size:18px;color:var(--slate)}
.cal-nav button:hover:not(:disabled){border-color:var(--teal);color:var(--teal-d)}
.cal-nav button:disabled{opacity:.35;cursor:not-allowed}
.cal-month{font-size:21px;font-weight:800;letter-spacing:-.5px;min-width:185px}.cal-month span{color:var(--slate-l);font-weight:600}
.cal-legend{display:flex;gap:15px;flex-wrap:wrap;margin-left:auto;font-size:12.5px;color:var(--slate)}
.cal-legend span{display:inline-flex;align-items:center;gap:6px}
.lg-sw{width:22px;height:11px;border-radius:3px}
.cal{border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--line);background:#fff;box-shadow:var(--shadow)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--teal-xd)}
.cal-dow div{padding:10px;color:#fff;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;text-align:center}
.cal-week{position:relative;border-bottom:1px solid var(--line)}.cal-week:last-child{border-bottom:none}
.week-days{display:grid;grid-template-columns:repeat(7,1fr);height:100%}
.wd{border-right:1px solid var(--line);padding:6px 8px;min-height:100%;background:#fff}.wd:last-child{border-right:none}
.wd.out{background:var(--bg-2)}.wd.weekend{background:#fbfcfc}
.wd.vakantie{background:repeating-linear-gradient(135deg,#faf6ec,#faf6ec 8px,#f2ebda 8px,#f2ebda 16px)}
.wd.feestdag{background:#f4f6f6}
.wd-num{font-size:12.5px;font-weight:700;color:var(--slate);display:flex;justify-content:space-between;align-items:flex-start;gap:4px}
.wd.today .wd-num .n{background:var(--teal);color:#fff;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:12px}
.wd-hol{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;text-align:right;line-height:1.25}
.wd-hol.vak{background:var(--sand);color:var(--sand-d)}.wd-hol.fst{background:#dfe6e5;color:var(--slate)}
.week-events{position:absolute;left:0;right:0;top:30px;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:25px;row-gap:4px;padding:0 4px;pointer-events:none}
.bar{pointer-events:auto;margin:0 2px;border-radius:7px;padding:0 8px;font-size:11.5px;line-height:24px;height:24px;cursor:pointer;display:flex;align-items:center;gap:6px;overflow:hidden;white-space:nowrap;transition:.12s;box-shadow:0 1px 2px rgba(8,83,79,.06)}
.bar:hover{filter:brightness(1.03);box-shadow:var(--shadow)}
.bar .b-klas{font-weight:800;font-size:10.5px;flex-shrink:0}
.bar .b-name{font-weight:600;overflow:hidden;text-overflow:ellipsis;opacity:.92}
.bar .b-bus{flex-shrink:0;display:inline-flex}.bar .b-arr{flex-shrink:0;opacity:.7;font-weight:800}
.bar.dag{background:var(--teal-l);color:var(--teal-xd);border-left:3px solid var(--teal)}
.bar.meer{background:var(--coral-soft);color:var(--coral-d);border-left:3px solid var(--coral-line)}
.bar.meer.contL{border-top-left-radius:0;border-bottom-left-radius:0;border-left:none}
.bar.meer.contR{border-top-right-radius:0;border-bottom-right-radius:0}
/* overlay/modal */
.overlay{position:fixed;inset:0;background:rgba(8,48,46,.45);backdrop-filter:blur(3px);z-index:90;display:grid;place-items:center;padding:20px;opacity:0;pointer-events:none;transition:.18s}
.overlay.show{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:var(--r-lg);width:100%;max-width:880px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);transform:translateY(12px) scale(.98);transition:.2s;overflow:hidden}
.overlay.show .modal{transform:none}
.modal-head{display:flex;align-items:flex-start;gap:14px;padding:20px 24px 14px;border-bottom:1px solid var(--line)}
.modal-head h2{font-size:19px;font-weight:800;letter-spacing:-.4px;line-height:1.2}
.modal-head .m-meta{font-size:13px;color:var(--slate);margin-top:3px}
.m-title{flex:1;min-width:0}
.modal-close{width:34px;height:34px;border-radius:9px;background:var(--bg);display:grid;place-items:center;font-size:20px;color:var(--slate);transition:.13s;flex-shrink:0}
.modal-close:hover{background:var(--line);color:var(--ink)}
.mtabs{display:flex;gap:2px;padding:0 18px;border-bottom:1px solid var(--line);background:var(--bg-2)}
.mtab{padding:12px 15px;font-size:13.5px;font-weight:600;color:var(--slate);border-bottom:2px solid transparent;transition:.13s}
.mtab:hover{color:var(--ink)}.mtab.on{color:var(--teal-d);border-color:var(--teal)}
.modal-body{padding:20px 24px;overflow:auto}
.mpane{display:none}.mpane.on{display:block}
.det-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 20px}
.det{font-size:14px}.det.full{grid-column:1/-1}.det.span2{grid-column:span 2}
.det .dk{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--slate-l);margin-bottom:3px}
.det .dv{font-weight:600}.det .dv.muted{font-weight:500;font-style:italic}
.det .inp{font-size:14px;padding:9px 11px}
.det textarea.inp{min-height:54px}
.modal-foot{display:flex;gap:10px;padding:14px 24px;border-top:1px solid var(--line);background:var(--bg-2);align-items:center}
.modal-foot .spacer{flex:1}
.toggle-pill{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:8px 14px;border-radius:10px;border:1.5px solid transparent;transition:.13s;cursor:pointer}
.toggle-pill.open{background:var(--amber-l);color:var(--amber-d);border-color:#f0dcb1}
.toggle-pill.done{background:var(--green-l);color:var(--green-d);border-color:#bfe6c5}
.toggle-pill .pt{width:8px;height:8px;border-radius:50%}.toggle-pill.open .pt{background:var(--amber)}.toggle-pill.done .pt{background:var(--green)}
.pin-modal{max-width:380px;text-align:center;padding:30px 28px;display:block}
.pin-modal .lk{width:54px;height:54px;border-radius:16px;background:var(--bg);display:grid;place-items:center;margin:0 auto 14px;color:var(--teal-d)}
.pin-modal h2{font-size:19px;margin-bottom:5px}.pin-modal p{color:var(--slate);font-size:14px;margin-bottom:18px}
.pin-in{text-align:center;letter-spacing:8px;font-size:22px;font-weight:700;padding:12px}
.pin-err{color:#c0493b;font-size:13px;font-weight:600;margin-top:10px;min-height:18px}
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:120;display:flex;flex-direction:column;gap:8px;align-items:center}

/* ---------------- SUPABASE SYNC ---------------- */
function supaOn(){return !!(SUPA.URL&&SUPA.KEY&&!/PLAK_HIER/.test(SUPA.KEY));}
function supaHeaders(extra){return Object.assign({apikey:SUPA.KEY,Authorization:"Bearer "+SUPA.KEY,"Content-Type":"application/json"},extra||{});}
async function supaGet(path){const r=await fetch(SUPA.URL+path,{headers:supaHeaders()});if(!r.ok)throw new Error("Supabase "+r.status);return r.json();}
async function supaSend(path,method,body,extra){try{const r=await fetch(SUPA.URL+path,{method,headers:supaHeaders(extra),body:body!==undefined?JSON.stringify(body):undefined});if(!r.ok){console.error("Supabase",method,path,r.status);toast("Opslaan in de database mislukte — wijziging enkel lokaal bewaard","err");}}catch(e){console.error("Supabase",e);toast("Geen verbinding — wijziging enkel lokaal bewaard","err");}}
function supaUpsertTrips(trips){supaSend("/rest/v1/uitstappen?on_conflict=id","POST",trips.map(t=>({id:t.id,schooljaar:SJ(),trip:t})),{Prefer:"resolution=merge-duplicates,return=minimal"});}

async function supaBoot(){

    supaGet("/rest/v1/uitstappen?select=trip&order=updated_at.asc"),

  if(Array.isArray(st)&&st.length&&st[0].data)Settings.applyRemote(st[0].data);
  else if(Array.isArray(st))supaSaveSettings(Settings.get());
}

function klasGroups(){const o={Kleuter:[],Lager:[]};klasList().forEach(k=>{if(!o[k.groep])o[k.groep]=[];o[k.groep].push(k.naam);});return o;}

const BUSMIJ=["Ros Beiaard","Coachpartners","Patsy Travel"];

/* Instellingen: schooljaar + kalenderdagen (zelf te beheren via de Instellingen-tab) */
const Settings=(()=>{
  const KEY="klimop_settings_v1";let mem=null;
  const defaults={schooljaar:"2026-2027",
    vakanties:[{id:"v1",naam:"Herfstvakantie",van:"2026-11-02",tot:"2026-11-08"},{id:"v2",naam:"Kerstvakantie",van:"2026-12-21",tot:"2027-01-03"},{id:"v3",naam:"Krokusvakantie",van:"2027-02-08",tot:"2027-02-14"},{id:"v4",naam:"Paasvakantie",van:"2027-03-29",tot:"2027-04-11"}],
    vrijedagen:[{id:"f1",naam:"Wapenstilstand",datum:"2026-11-11"},{id:"f2",naam:"Nieuwjaar",datum:"2027-01-01"},{id:"f3",naam:"Dag v/d Arbeid",datum:"2027-05-01"},{id:"f4",naam:"Hemelvaart",datum:"2027-05-06"},{id:"f5",naam:"Brugdag",datum:"2027-05-07"},{id:"f6",naam:"Pinkstermaandag",datum:"2027-05-17"}],
    meldingen:[],
    klassen:[{id:"k01",naam:"Instap A",groep:"Kleuter"},{id:"k02",naam:"Instap B",groep:"Kleuter"},{id:"k03",naam:"1KA",groep:"Kleuter"},{id:"k04",naam:"1KB",groep:"Kleuter"},{id:"k05",naam:"2KA",groep:"Kleuter"},{id:"k06",naam:"2KB",groep:"Kleuter"},{id:"k07",naam:"3KA",groep:"Kleuter"},{id:"k08",naam:"3KB",groep:"Kleuter"},{id:"k09",naam:"1A",groep:"Lager"},{id:"k10",naam:"1B",groep:"Lager"},{id:"k11",naam:"2A",groep:"Lager"},{id:"k12",naam:"2B",groep:"Lager"},{id:"k13",naam:"3A",groep:"Lager"},{id:"k14",naam:"3B",groep:"Lager"},{id:"k15",naam:"4A",groep:"Lager"},{id:"k16",naam:"4B",groep:"Lager"},{id:"k17",naam:"5A",groep:"Lager"},{id:"k18",naam:"5B",groep:"Lager"},{id:"k19",naam:"5C",groep:"Lager"},{id:"k20",naam:"6A",groep:"Lager"},{id:"k21",naam:"6B",groep:"Lager"},{id:"k22",naam:"6C",groep:"Lager"}]};
  const read=()=>{try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null;}catch(e){return mem;}};
  const write=o=>{try{localStorage.setItem(KEY,JSON.stringify(o));mem=o;}catch(e){mem=o;}};
  let cur=read();if(!cur){cur=JSON.parse(JSON.stringify(defaults));}
  cur.vakanties=cur.vakanties||[];cur.vrijedagen=cur.vrijedagen||[];cur.meldingen=cur.meldingen||[];if(!cur.klassen||!cur.klassen.length)cur.klassen=JSON.parse(JSON.stringify(defaults.klassen));
  const fix=o=>{o.vakanties=o.vakanties||[];o.vrijedagen=o.vrijedagen||[];o.meldingen=o.meldingen||[];if(!o.klassen||!o.klassen.length)o.klassen=JSON.parse(JSON.stringify(defaults.klassen));return o;};
  return {get:()=>cur,save:o=>{cur=fix(o);write(cur);supaSaveSettings(cur);},applyRemote:o=>{cur=fix(o);write(cur);},defaults:()=>JSON.parse(JSON.stringify(defaults))};
})();
const SJ=()=>Settings.get().schooljaar;
function kalMaanden(){const y1=Number(SJ().split("-")[0])||2026;const out=[];let y=y1,m=8;for(let i=0;i<10;i++){out.push({y,m});m++;if(m>11){m=0;y++;}}return out;}

const sjMax=()=>{const y=Number((SJ().split("-")[1]||SJ().split("-")[0]))||2027;return y+"-08-31";};
const Store=(()=>{const KEY="klimop_uitstappen_v3";let mem=[];
  const readL=()=>{try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):[];}catch(e){return mem;}};
  const writeL=a=>{mem=a;try{localStorage.setItem(KEY,JSON.stringify(a));}catch(e){}};
  let cache=readL();
  let synced=new Map(cache.map(t=>[t.id,JSON.stringify(t)]));
  const mark=a=>{synced=new Map(a.map(t=>[t.id,JSON.stringify(t)]));};
  return {
    all:()=>cache,
    setAll:a=>{cache=a;writeL(a);mark(a);},
    save:arr=>{
      cache=arr;writeL(arr);
      if(!supaOn()){mark(arr);return;}
      const ids=new Set(arr.map(t=>t.id));
      const changed=arr.filter(t=>synced.get(t.id)!==JSON.stringify(t));
      const removedIds=[...synced.keys()].filter(id=>!ids.has(id));
      if(changed.length)supaUpsertTrips(changed);
      if(removedIds.length){if(!arr.length)supaDeleteAll();else removedIds.forEach(id=>supaDeleteTrip(id));}
      mark(arr);
    }
  };})();
let state={view:"bestellen",isAdmin:false,sortKey:"datum",sortDir:1,search:"",fKlas:"",fMaand:"",busFilter:"alle",factuurFilter:"alle",ovView:"standaard",groupBy:"",calIdx:0,

const toISO=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const fmtDate=s=>{const d=parseISO(s);return d?DOW[(d.getDay()+6)%7]+" "+d.getDate()+" "+MAANDEN[d.getMonth()]:"";};

function dayType(iso){const d=parseISO(iso);const dow=(d.getDay()+6)%7;const s=Settings.get();const f=s.vrijedagen.find(x=>x.datum===iso);if(f)return{t:"feestdag",label:f.naam};for(const v of s.vakanties)if(iso>=v.van&&iso<=v.tot)return{t:"vakantie",label:v.naam};if(dow>=5)return{t:"weekend"};return{t:"school"};}
function annForDate(iso){const s=Settings.get();const out=[];s.vakanties.forEach(v=>{if(iso>=v.van&&iso<=v.tot)out.push({kind:"vakantie",naam:v.naam});});s.vrijedagen.forEach(f=>{if(iso===f.datum)out.push({kind:"vrije dag",naam:f.naam});});s.meldingen.forEach(m=>{const e=m.datumEind||m.datum;if(iso>=m.datum&&iso<=e)out.push({kind:"melding",naam:m.naam});});return out;}
function annForRange(s,e){const out=[];let d=parseISO(s);if(!d)return out;const end=parseISO(e||s);while(d<=end){annForDate(toISO(d)).forEach(a=>{if(!out.find(x=>x.kind===a.kind&&x.naam===a.naam))out.push(a);});d.setDate(d.getDate()+1);}return out;}
function parseEuro(str){if(str==null)return null;let s=String(str).replace(/[^0-9.,]/g,"").trim();if(s==="")return null;if(s.indexOf(",")>-1&&s.indexOf(".")>-1)s=s.replace(/\./g,"").replace(",",".");else if(s.indexOf(",")>-1)s=s.replace(",",".");const n=Number(s);return isNaN(n)?null:n;}

function applyFilters(){
  let rows=Store.all();
  if(state.fKlas)rows=rows.filter(r=>(r.klassen||[]).includes(state.fKlas));
  if(state.busFilter==="ja")rows=rows.filter(r=>r.busNodig);else if(state.busFilter==="nee")rows=rows.filter(r=>!r.busNodig);
  if(state.fMaand!==""){const[y,mo]=state.fMaand.split("-").map(Number);const ms=`${y}-${String(mo+1).padStart(2,"0")}-01`,me=`${y}-${String(mo+1).padStart(2,"0")}-31`;rows=rows.filter(r=>r.datumStart<=me&&tripEnd(r)>=ms);}
  if(state.factuurFilter!=="alle")rows=rows.filter(r=>{const full=r.factuurUitstap&&(!r.busNodig||r.factuurBus);return state.factuurFilter==="open"?!full:full;});
  if(state.search.trim()){const q=state.search.toLowerCase();rows=rows.filter(r=>[r.activiteit,r.leerkracht,r.straat,r.stad,r.busmaatschappij,(r.klassen||[]).join(" ")].join(" ").toLowerCase().includes(q));}
  rows.sort((a,b)=>{let c;if(state.sortKey==="klas")c=klasIdx(a.klassen)-klasIdx(b.klassen);else if(state.sortKey==="activiteit")c=(a.activiteit||"").localeCompare(b.activiteit||"");else if(state.sortKey==="leerkracht")c=(a.leerkracht||"").localeCompare(b.leerkracht||"");else c=(a.datumStart||"").localeCompare(b.datumStart||"");if(c===0)c=(a.datumStart||"").localeCompare(b.datumStart||"");return c*state.sortDir;});
  return rows;
}

function buildGroups(rows){
  if(state.groupBy==="klas")return klasVolgorde().map(k=>({label:k,rows:rows.filter(r=>(r.klassen||[]).includes(k))})).filter(g=>g.rows.length);
  const seen=new Map();rows.forEach(r=>{const d=parseISO(r.datumStart),key=d.getFullYear()+"-"+d.getMonth();if(!seen.has(key))seen.set(key,{label:MAANDEN_VOL[d.getMonth()].charAt(0).toUpperCase()+MAANDEN_VOL[d.getMonth()].slice(1)+" "+d.getFullYear(),rows:[]});seen.get(key).rows.push(r);});return [...seen.values()];
}

/* ---------------- KALENDER ---------------- */
function monthWeeks(y,m){const last=new Date(y,m+1,0),sd=(new Date(y,m,1).getDay()+6)%7;const weeks=[];let cur=[];for(let i=0;i<sd;i++)cur.push(null);for(let d=1;d<=last.getDate();d++){cur.push(new Date(y,m,d));if(cur.length===7){weeks.push(cur);cur=[];}}if(cur.length){while(cur.length<7)cur.push(null);weeks.push(cur);}return weeks;}
function layoutWeek(week,events){const days=week.map(d=>d?toISO(d):null);const segs=[];events.forEach(ev=>{const s=ev.s,e=ev.e;let sc=-1,ec=-1;for(let i=0;i<7;i++){const iso=days[i];if(iso&&iso>=s&&iso<=e){if(sc<0)sc=i;ec=i;}}if(sc<0)return;segs.push({ev,sc,ec,contL:days[sc]>s,contR:days[ec]<e});});segs.sort((a,b)=>a.sc-b.sc||(b.ec-b.sc)-(a.ec-a.sc));const laneEnd=[];segs.forEach(sg=>{let l=0;while(laneEnd[l]!=null&&laneEnd[l]>=sg.sc)l++;sg.lane=l;laneEnd[l]=sg.ec;});return {segs,lanes:segs.length?Math.max(...segs.map(s=>s.lane))+1:0};}
function viewKalender(){
  const KM=kalMaanden();const {y,m}=KM[state.calIdx]||KM[0],weeks=monthWeeks(y,m);
  const events=[...Store.all().map(t=>({id:t.id,kind:"trip",s:t.datumStart,e:tripEnd(t),ref:t})),
    ...Settings.get().meldingen.map(mm=>({id:mm.id,kind:"melding",s:mm.datum,e:mm.datumEind||mm.datum,ref:mm}))];
  let wk="";
  weeks.forEach(week=>{
    const {segs,lanes}=layoutWeek(week,events),h2=Math.max(108,32+lanes*29+8);
    let cells="";
    week.forEach(d=>{
      if(!d){cells+=`<div class="wd out"></div>`;return;}
      const iso=toISO(d),dt=dayType(iso),today=iso===toISO(new Date());
      const hol=dt.t==='vakantie'?`<span class="wd-hol vak">${esc(dt.label)}</span>`:dt.t==='feestdag'?`<span class="wd-hol fst">${esc(dt.label)}</span>`:'';
      cells+=`<div class="wd ${dt.t} ${today?'today':''}" data-iso="${iso}"><div class="wd-num"><span class="n">${d.getDate()}</span>${hol}</div></div>`;
    });
    let bars="";
    segs.forEach(sg=>{const ev=sg.ev;const arrL=sg.contL?'<span class="b-arr">‹</span>':'',arrR=sg.contR?'<span class="b-arr">›</span>':'';
      if(ev.kind==="melding"){
        bars+=`<div class="bar melding ${sg.contL?'contL':''} ${sg.contR?'contR':''}" data-mid="${ev.id}" style="grid-column:${sg.sc+1}/${sg.ec+2};grid-row:${sg.lane+1}" title="Melding: ${esc(ev.ref.naam)}">${arrL}<span class="b-pin">📌</span><span class="b-name">${esc(ev.ref.naam)}</span>${arrR}</div>`;
      }else{
        const t=ev.ref,meer=t.type==='meerdaags',klas=sortedKlassen(t.klassen).join(" "),bus=t.busNodig?`<span class="b-bus">${busSvg(12)}</span>`:'';
        bars+=`<div class="bar ${meer?'meer':'dag'} ${sg.contL?'contL':''} ${sg.contR?'contR':''}" data-id="${t.id}" style="grid-column:${sg.sc+1}/${sg.ec+2};grid-row:${sg.lane+1}" title="${esc(klas)} — ${esc(t.activiteit)}">${arrL}${bus}<span class="b-klas">${esc(klas)}</span><span class="b-name">${esc(t.activiteit)}</span>${arrR}</div>`;
      }
    });
    wk+=`<div class="cal-week" style="min-height:${h2}px"><div class="week-days">${cells}</div><div class="week-events">${bars}</div></div>`;
  });
  return `
  <div class="print-header" id="printHdr"></div>
  <div class="view-title">Kalender</div>
  <p class="view-sub">Klik op een uitstap voor details. Meerdaagse uitstappen lopen als één balk door.${state.isAdmin?' Klik op een lege dag om een melding toe te voegen (studiedag, fotograaf, sluiting…).':''}</p>
  <div class="cal-head">
    <div class="cal-nav"><button id="calPrev" ${state.calIdx===0?'disabled':''}>‹</button><button id="calNext" ${state.calIdx===KM.length-1?'disabled':''}>›</button></div>
    <div class="cal-month">${MAANDEN_VOL[m].charAt(0).toUpperCase()+MAANDEN_VOL[m].slice(1)} <span>${y}</span></div>
    <button class="btn btn-line btn-sm" id="calPrint">🖨 Afdrukken</button>
    <div class="cal-legend"><span><span class="lg-sw" style="background:var(--teal-l);border-left:3px solid var(--teal)"></span>Dagactiviteit</span><span><span class="lg-sw" style="background:var(--coral-soft);border-left:3px solid var(--coral-line)"></span>Meerdaags</span><span><span class="lg-sw" style="background:#eef1f1;border-left:3px solid #b8c4c2"></span>Melding</span><span><span class="lg-sw" style="background:var(--sand)"></span>Vakantie</span></div>
  </div>
  <div class="cal${state.isAdmin?' admin':''}"><div class="cal-dow">${DOW.map(d=>`<div>${d}</div>`).join("")}</div><div class="cal-grid">${wk}</div></div>`;
}

/* ---------------- DATA MUTATIES ---------------- */
function setField(id,field,value){
  const all=Store.all(),t=all.find(x=>x.id===id);if(!t)return;
  if(["kostprijs","prijsVervoer","aantalLln","aantalBegeleiders","kostOpenbaar","voorschotBedrag"].includes(field))t[field]=value===""?null:Number(value);
  else if(field==="busNodig"){t.busNodig=(value==="ja");if(t.busNodig){t.vervoerwijze=null;t.openbaarVervoerder=null;t.kostOpenbaar=null;}}
  else if(field==="vervoerwijze"){t.vervoerwijze=value||null;if(value!=="openbaar"){t.openbaarVervoerder=null;t.kostOpenbaar=null;}}
  else if(field==="type"){t.type=value;if(value==="dag")t.datumEind=null;}
  else t[field]=value;
  Store.save(all);
}
function toggleInvoice(which,id){const all=Store.all(),t=all.find(x=>x.id===id);if(!t)return;if(which==="uitstap")t.factuurUitstap=!t.factuurUitstap;else t.factuurBus=!t.factuurBus;Store.save(all);}
function toggleKlas(id,k){const all=Store.all(),t=all.find(x=>x.id===id);if(!t)return;t.klassen=t.klassen||[];t.klassen=t.klassen.includes(k)?t.klassen.filter(x=>x!==k):[...t.klassen,k];Store.save(all);}
function delTrip(id){Store.save(Store.all().filter(x=>x.id!==id));}

function submitForm(){
  const v=id=>($("#"+id)?.value||"").trim();

  if(!v("f_lln")){toast("Vul het aantal leerlingen in","err");$("#f_lln").focus();return;}

  if(!state.fKostBasis){toast("Duid aan of de kostprijs het totaal of de prijs per leerling is","err");return;}

  if(state.fBus===null){toast("Duid aan of er busvervoer nodig is","err");$("#busWarn").classList.add("show");return;}

  if(state.fType==="meerdaags"&&!v("f_datumEind")){toast("Kies de einddatum van de meerdaagse uitstap","err");$("#f_datumEind").focus();return;}

  if(!state.fBetaalKeuze){toast("Geef aan hoe de uitstap betaald wordt","err");return;}

  if(state.fBetaalKeuze==="Andere"){betaalwijze=v("f_betaalwijze");if(!betaalwijze){toast("Beschrijf de andere betaalwijze","err");$("#f_betaalwijze").focus();return;}}
  const email=v("f_email");

  const vsOn=!!$("#f_voorschotChk")?.checked;let vsBedrag=null,vsIncl=null;

  const t={id:uid(),type:state.fType,datumStart:v("f_datumStart"),datumEind:state.fType==="meerdaags"?(v("f_datumEind")||v("f_datumStart")):null,
    leerkracht:v("f_leerkracht"),klassen:[...state.fKlassen],aantalLln:Number(v("f_lln"))||0,aantalBegeleiders:v("f_beg")?Number(v("f_beg")):0,

    vertrekSchool:v("f_vertrek"),terug:v("f_terug"),busNodig:state.fBus,

    betaalwijze:betaalwijze,voorschot:vsOn,voorschotBedrag:vsBedrag,voorschotInclusief:vsIncl||null,

function openTrip(id,fromCalendar){modalTab=0;renderTrip(id,fromCalendar);}
function renderTrip(id,fromCalendar){
  const t=get(id);if(!t)return;const ov=$("#overlay");
  const editable=state.isAdmin&&!fromCalendar;
  const head=`<div class="modal-head"><div class="m-title"><h2>${esc(t.activiteit)}</h2><div class="m-meta">${fmtLong(t.datumStart)}${t.type==='meerdaags'&&t.datumEind?' — t.e.m. '+fmtLong(t.datumEind):''}</div></div><button class="modal-close" data-close>×</button></div>`;

}

  // pane 0
  const p0=`<div class="mpane ${modalTab===0?'on':''}"><div class="det-grid">
    <div class="det"><div class="dk">Soort</div><select class="inp" data-id="${t.id}" data-field="type" data-struct="1"><option value="dag" ${t.type==='dag'?'selected':''}>Daguitstap / activiteit</option><option value="meerdaags" ${t.type==='meerdaags'?'selected':''}>Meerdaagse uitstap</option></select></div>

      <div class="legend"><span class="dot"></span>Meldingen <span class="opt" style="text-transform:none;letter-spacing:0;font-weight:500">(naam · datum · eind optioneel)</span></div>
      <div class="set-list">${meldRows}</div>
      <button class="btn btn-line btn-sm" id="addMeld" style="margin-top:10px">+ Melding toevoegen</button>
      <p class="hint">Studiedag, schoolfotograaf, andere sluiting… Deze blokkeren niets, maar geven een waarschuwing bij het bestellen. Je kan ze ook rechtstreeks in de kalender toevoegen.</p>
    </div>
    <div class="fieldset">
      <div class="legend"><span class="dot"></span>Nieuw schooljaar klaarzetten</div>
      <p class="hint" style="margin-bottom:12px">Dit downloadt eerst alle huidige uitstappen als archief (CSV), wist daarna de uitstappenlijst en zet het schooljaar + de kalenderdagen leeg klaar voor een nieuw jaar.</p>
      <button class="btn btn-primary" id="nieuwJaar">Archiveer &amp; start nieuw schooljaar</button>
    </div>
  </div></div>`;
}
function bindInstellingen(){
  const sj=$("#setSJ");if(sj)sj.onchange=()=>{const s=Settings.get();s.schooljaar=sj.value.trim()||s.schooljaar;Settings.save(s);state.calIdx=0;render();};
  $$('[data-sl]').forEach(inp=>inp.onchange=()=>{const s=Settings.get();const it=(s[inp.dataset.sl]||[]).find(x=>x.id===inp.dataset.id);if(it){const val=inp.value;it[inp.dataset.f]=(inp.dataset.f==='datumEind'&&!val)?null:val;}Settings.save(s);});
  $$('[data-del-sl]').forEach(b=>b.onclick=()=>{const s=Settings.get();const k=b.dataset.delSl;s[k]=s[k].filter(x=>x.id!==b.dataset.id);Settings.save(s);render();});
  const av=$("#addVak");if(av)av.onclick=()=>{const s=Settings.get();s.vakanties.push({id:uid(),naam:"",van:"",tot:""});Settings.save(s);render();};
  const af=$("#addVrij");if(af)af.onclick=()=>{const s=Settings.get();s.vrijedagen.push({id:uid(),naam:"",datum:""});Settings.save(s);render();};
  const am=$("#addMeld");if(am)am.onclick=()=>{const s=Settings.get();s.meldingen.push({id:uid(),naam:"",datum:"",datumEind:null});Settings.save(s);render();};
  $$('[data-kl]').forEach(el=>el.onchange=()=>{const s=Settings.get();const k=s.klassen.find(x=>x.id===el.dataset.kl);if(!k)return;const fld=el.dataset.klf;if(fld==='naam'){const oud=el.dataset.old,nieuw=el.value.trim();if(!nieuw){el.value=oud;return;}if(nieuw!==oud){k.naam=nieuw;const all=Store.all();let ch=false;all.forEach(t=>{if(t.klassen&&t.klassen.includes(oud)){t.klassen=t.klassen.map(x=>x===oud?nieuw:x);ch=true;}});if(ch)Store.save(all);}}else{k.groep=el.value;}Settings.save(s);render();});
  $$('[data-del-kl]').forEach(b=>b.onclick=()=>{if(!confirm("Deze klas uit de lijst verwijderen?"))return;const s=Settings.get();s.klassen=s.klassen.filter(x=>x.id!==b.dataset.delKl);Settings.save(s);render();});
  const ak=$("#addKleuter");if(ak)ak.onclick=()=>{const s=Settings.get();s.klassen.push({id:uid(),naam:"",groep:"Kleuter"});Settings.save(s);render();};
  const al=$("#addLager");if(al)al.onclick=()=>{const s=Settings.get();s.klassen.push({id:uid(),naam:"",groep:"Lager"});Settings.save(s);render();};
  const nj=$("#nieuwJaar");if(nj)nj.onclick=nieuwSchooljaar;
}
function nieuwSchooljaar(){
  if(!confirm("Zeker? Dit downloadt eerst een archief (CSV) van alle uitstappen, wist daarna de uitstappenlijst en zet een nieuw schooljaar klaar."))return;
  if(Store.all().length)exportCSV();
  const s=Settings.get();const parts=(s.schooljaar.match(/\d{4}/g)||[]);let nj=s.schooljaar;
  if(parts.length>=2)nj=(Number(parts[0])+1)+"-"+(Number(parts[1])+1);else if(parts.length===1)nj=(Number(parts[0])+1)+"-"+(Number(parts[0])+2);
  Store.save([]);
  s.schooljaar=nj;s.vakanties=[];s.vrijedagen=[];s.meldingen=[];Settings.save(s);
  state.calIdx=0;state.view="instellingen";render();
  toast("Nieuw schooljaar "+nj+" klaargezet — vul de vakanties en vrije dagen in.");
}

$$(".tab").forEach(t=>t.onclick=()=>{state.view=t.dataset.view;render();});
(async()=>{
  if(supaOn()){
    try{await supaBoot();}
    catch(e){console.error(e);toast("Geen verbinding met de database — lokale gegevens worden getoond","err");}
  }
  render();
})();
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState!=="visible"||!supaOn())return;
  supaBoot().then(()=>{const ov=$("#overlay");if(state.view!=="bestellen"&&!(ov&&ov.classList.contains("show")))render();}).catch(()=>{});
});
</script>
</body>
</html>
